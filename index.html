<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulin Yensith - Under Maintenance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- ඇසට ප්‍රියමනාප Fonts --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* --- Animated Background Particles --- */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(135deg, #0b0b1a 0%, #050505 100%);
            z-index: 1;
        }

        /* --- Main Content Card (Responsive Design) --- */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px; /* PC එකේදී ලස්සනට මැදට එන්න */
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Logo Styling --- */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
        }

        /* --- Text Styling --- */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #00f2fe, #fb0094);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .si-text {
            font-size: 1.1rem;
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .en-text {
            font-size: 0.9rem;
            color: #aaa;
            font-style: italic;
            margin-bottom: 30px;
        }

        /* --- Progress Bar (අලුත්වැඩියාව පෙන්වීමට) --- */
        .progress-container {
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            width: 70%; /* වැඩ නිමවී ඇති ප්‍රමාණය */
            height: 100%;
            background: linear-gradient(to right, #00f2fe, #fb0094);
            border-radius: 10px;
            animation: progressAnim 3s infinite;
        }

        @keyframes progressAnim {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* --- Social Icons --- */
        .social-icons a {
            color: #fff;
            margin: 0 12px;
            font-size: 1.3rem;
            transition: 0.3s;
            opacity: 0.7;
        }

        .social-icons a:hover {
            color: #00f2fe;
            opacity: 1;
            transform: scale(1.2);
        }

        /* --- Mobile Optimization (ෆෝන් එකට ගැලපෙන ලෙස) --- */
        @media (max-width: 480px) {
            .glass-card {
                padding: 30px 20px;
                max-width: 350px;
            }
            h1 { font-size: 1.8rem; }
            .si-text { font-size: 1rem; }
            .logo-img { width: 85px; height: 85px; }
        }

        /* --- PC Optimization (පරිගණකයට ගැලපෙන ලෙස) --- */
        @media (min-width: 1024px) {
            .glass-card {
                max-width: 550px;
            }
            h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="glass-card">
        <div class="logo-container">
            <img src="logo.jpeg" alt="Logo" class="logo-img">
        </div>

        <h1>Dulin Yensith</h1>
        
        <p class="si-text">
            වෙබ් අඩවිය අලුත්වැඩියා වෙමින් පවතී. <br>
            ඉතා ඉක්මනින් ලස්සනම අත්දැකීමක් සමඟ ඔබ හමුවට එන්නෙමු!
        </p>

        <p class="en-text">
            We're currently under maintenance to upgrade your experience. Stay with us!
        </p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00f2fe" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2fe", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 1.5 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "repulse" } }
            }
        });
    </script>
</body>
</html>
