<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulin Yensith | Maintenance Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #020205;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }

        .main-container {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 480px;
            padding: 35px 20px;
            background: rgba(10, 10, 25, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.2);
        }

        /* --- Logo & Status --- */
        .logo-wrapper { margin-bottom: 10px; animation: float 4s ease-in-out infinite; }
        .main-logo {
            width: 90px; height: 90px;
            border-radius: 50%; border: 3px solid #fb0094;
            box-shadow: 0 0 20px rgba(251, 0, 148, 0.5);
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem; font-weight: 700;
            background: linear-gradient(90deg, #00f2fe, #fb0094);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .maintenance-tag {
            background: rgba(251, 0, 148, 0.2);
            color: #fb0094;
            font-size: 0.7rem;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
            font-weight: bold;
            border: 1px solid #fb0094;
            letter-spacing: 1px;
        }

        .info-text { font-size: 0.9rem; color: #ccc; margin: 10px 0 20px; line-height: 1.5; }

        /* --- Advanced Mini Game --- */
        .game-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 25px;
            padding: 20px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            position: relative;
        }

        .game-header { font-size: 0.8rem; color: #00f2fe; margin-bottom: 15px; font-weight: 600; }

        .game-canvas {
            height: 200px;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            overflow: hidden;
            cursor: crosshair;
        }

        #target {
            position: absolute;
            font-size: 40px;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            filter: drop-shadow(0 0 10px #00f2fe);
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
        }

        /* --- Footer --- */
        .coming-soon { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: #00f2fe; margin: 25px 0 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .social-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .social-links a { color: #fff; font-size: 1.2rem; opacity: 0.5; transition: 0.3s; }
        .social-links a:hover { opacity: 1; color: #fb0094; }

        .footer-note { font-size: 0.7rem; color: #555; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .footer-note b { color: #00f2fe; }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-container">
        <div class="logo-wrapper">
            <img src="Logo.jpeg" alt="Logo" class="main-logo">
        </div>

        <h1 class="brand-name">Dulin Yensith</h1>
        <div class="maintenance-tag">UNDER MAINTENANCE</div>

        <p class="info-text">
            අපි අපේ වෙබ් අඩවිය අලුත්වැඩියා කරමින් පවතිනවා. <br>
            වැඩ ඉවර වෙනකම් මේක සෙල්ලම් කරමුද?
        </p>

        <div class="game-box">
            <div class="game-header">අල්ලන්න බලන්න! (Catch Me) 🎯</div>
            <div class="game-canvas" id="canvas">
                <div id="target">👾</div>
            </div>
            <div class="score-row">
                <span>Score: <b id="score">0</b></span>
                <span>Best: <b id="best">0</b></span>
            </div>
        </div>

        <div class="coming-soon">COMING SOON</div>

        <div class="social-links">
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>

        <div class="footer-note">
            Design By <b>Yensith</b>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Background
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00f2fe" },
                "opacity": { "value": 0.2 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "opacity": 0.05 },
                "move": { "enable": true, "speed": 1 }
            }
        });

        // Pro Game Logic
        const target = document.getElementById('target');
        const canvas = document.getElementById('canvas');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        
        let score = 0;
        let bestScore = 0;
        const items = ['👾', '🚀', '💎', '🔥', '⚡', '🛸'];

        function move() {
            const maxX = canvas.clientWidth - 50;
            const maxY = canvas.clientHeight - 50;
            
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            
            target.style.transform = `translate(${x}px, ${y}px)`;
        }

        function catchItem(e) {
            e.preventDefault();
            score++;
            scoreEl.innerText = score;
            
            if(score > bestScore) {
                bestScore = score;
                bestEl.innerText = bestScore;
            }

            // Change item and move
            target.innerText = items[Math.floor(Math.random() * items.length)];
            move();
            
            // Effect
            canvas.style.background = "rgba(0, 242, 254, 0.1)";
            setTimeout(() => canvas.style.background = "transparent", 100);
        }

        target.addEventListener('touchstart', catchItem);
        target.addEventListener('mousedown', catchItem);

        // Auto move if not caught
        let gameTimer = setInterval(move, 1200);

        // Increase difficulty
        setInterval(() => {
            if(score > 10) {
                clearInterval(gameTimer);
                gameTimer = setInterval(move, 800);
            }
        }, 5000);

        move();
    </script>
</body>
</html>
